<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Poisoning the FOSS Well Social Card</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap");

      :root {
        --canvas: #fbffea;
        --paper: #f7fbdf;
        --ink: #082629;
        --ink-soft: #294448;
        --muted: #5c6f70;
        --line: rgba(8, 38, 41, 0.22);
        --shadow: rgba(8, 38, 41, 0.12);
        --orange: #ff7a2f;
        --amber: #f8bd4b;
        --magenta: #e520e9;
        --green: #95f0a8;
        --blue: #72d4ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1600px;
        height: 900px;
        overflow: hidden;
        background: var(--canvas);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Aptos", "Segoe UI", system-ui, sans-serif;
      }

      body {
        background:
          linear-gradient(rgba(8, 38, 41, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(8, 38, 41, 0.035) 1px, transparent 1px),
          var(--canvas);
        background-size: 46px 46px;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 72px 78px 58px;
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(251, 255, 234, 0.96) 0%, rgba(251, 255, 234, 0.9) 42%, rgba(251, 255, 234, 0.54) 66%, rgba(251, 255, 234, 0.18) 100%),
          linear-gradient(135deg, rgba(255, 122, 47, 0.08), transparent 38%),
          linear-gradient(315deg, rgba(114, 212, 255, 0.1), transparent 42%);
        pointer-events: none;
      }

      .layout {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 600px 1fr;
        gap: 58px;
        align-items: center;
        height: 100%;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        margin: 0 0 30px;
        color: var(--ink-soft);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 22px;
        font-weight: 600;
      }

      .eyebrow::before {
        content: "";
        width: 58px;
        height: 6px;
        background: linear-gradient(90deg, var(--orange), var(--magenta));
      }

      .title {
        margin: 0;
        max-width: 590px;
        font-family: "Bricolage Grotesque", "IBM Plex Sans", sans-serif;
        font-size: 106px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.91;
      }

      .title span {
        display: block;
      }

      .subtitle {
        max-width: 570px;
        margin: 34px 0 0;
        color: var(--ink-soft);
        font-size: 34px;
        font-weight: 500;
        line-height: 1.18;
      }

      .signals {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 42px;
      }

      .signal {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #123438;
        font-size: 23px;
        font-weight: 700;
      }

      .signal::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 2px solid var(--ink);
        transform: rotate(45deg);
      }

      .signal.orange::before {
        background: var(--orange);
        border-color: var(--orange);
      }

      .signal.blue::before {
        background: var(--blue);
        border-color: var(--blue);
      }

      .signal.green::before {
        background: var(--green);
        border-color: #35a64d;
      }

      .site {
        position: absolute;
        left: 78px;
        bottom: 54px;
        z-index: 2;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 21px;
        font-weight: 600;
      }

      .art {
        position: relative;
        height: 706px;
        border: 1px solid rgba(8, 38, 41, 0.34);
        border-radius: 8px;
        overflow: hidden;
        box-shadow:
          12px 12px 0 var(--shadow),
          0 20px 46px rgba(8, 38, 41, 0.16);
        background: var(--paper);
      }

      .art img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: 50% 50%;
        filter: saturate(0.92) contrast(1.04);
      }

      .art::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(251, 255, 234, 0.3) 0%, rgba(251, 255, 234, 0.02) 34%, transparent 100%),
          linear-gradient(180deg, rgba(8, 38, 41, 0.04), rgba(8, 38, 41, 0.18));
      }

      .art-label {
        position: absolute;
        left: 28px;
        bottom: 28px;
        max-width: 430px;
        padding: 16px 18px;
        border: 1px solid rgba(8, 38, 41, 0.18);
        border-radius: 8px;
        background: rgba(251, 255, 234, 0.9);
        color: var(--ink-soft);
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 18px;
        font-weight: 600;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="layout">
        <section>
          <div class="eyebrow">Presentation deck</div>
          <h1 class="title">
            <span>Poisoning</span>
            <span>the FOSS</span>
            <span>Well</span>
          </h1>
          <p class="subtitle">
            How AI-generated pull requests, widening attack surfaces, and
            collapsing trust are reshaping open source.
          </p>
          <div class="signals" aria-hidden="true">
            <div class="signal orange">Review labour at machine speed</div>
            <div class="signal blue">New supply-chain attack surfaces</div>
            <div class="signal green">A commons built on fragile trust</div>
          </div>
        </section>

        <figure class="art" aria-hidden="true">
          <img src="illustrations/foss-social-system.jpg" alt="" />
          <figcaption class="art-label">
            FOSS as a shared well: social trust, review labour, and reciprocity
            under pressure.
          </figcaption>
        </figure>
      </div>

      <div class="site">indrapatil.com/ai-poisoned-foss-well</div>
    </main>
  </body>
</html>
