<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title desc">
  <title id="title">chardet licence laundering via AI rewrite</title>
  <desc id="desc">A stylized evidence card showing how chardet's maintainer used Claude to rewrite the library and relicense it from LGPL to MIT, raising questions about AI-enabled licence laundering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="600" fill="url(#bg)"/>
  <circle cx="1200" cy="90" r="170" fill="#fde68a" opacity="0.55"/>
  <circle cx="140" cy="540" r="130" fill="#fee2e2" opacity="0.8"/>

  <rect x="115" y="75" width="1170" height="450" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="115" y="75" width="1170" height="12" rx="34" fill="url(#accent)"/>

  <text x="165" y="145" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">chardet 7.0</text>
  <text x="165" y="185" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" fill="#475569">Python character detection · ~130M downloads/month · March 2026</text>

  <text x="165" y="268" font-family="Space Grotesk, Arial, sans-serif" font-size="46" font-weight="700" fill="#111827">LGPL → Claude rewrite → MIT</text>

  <!-- Before / After boxes -->
  <rect x="165" y="300" width="350" height="115" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="195" y="340" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e40af">Before</text>
  <text x="195" y="372" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">LGPL-licensed for 15+ years</text>
  <text x="195" y="400" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">Copyleft protections intact</text>

  <rect x="545" y="300" width="350" height="115" rx="22" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="575" y="340" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#9f1239">After</text>
  <text x="575" y="372" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">AI "clean room" rewrite in 5 days</text>
  <text x="575" y="400" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">Relicensed as MIT</text>

  <rect x="925" y="300" width="320" height="115" rx="22" fill="#fef3c7" stroke="#fde68a"/>
  <text x="955" y="340" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">The question</text>
  <text x="955" y="372" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">Is this a clean room if the</text>
  <text x="955" y="400" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#475569">LLM ingested the original?</text>

  <rect x="165" y="440" width="1080" height="50" rx="16" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="700" y="473" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#9f1239">"Copyleft depends on friction to enforce it. You can trivially rewrite it now." — Armin Ronacher</text>

</svg>
