<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">GitHub stars for sale as a broken trust signal</title>
  <desc id="desc">A stylized evidence card showing paid GitHub stars, suspected fake stars at scale, and the loop from visibility to funding pressure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1190" cy="150" r="210" fill="#fde68a" opacity="0.62"/>
  <circle cx="210" cy="780" r="185" fill="#fecdd3" opacity="0.8"/>

  <rect x="105" y="85" width="1190" height="725" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="105" y="85" width="1190" height="12" rx="36" fill="url(#accent)"/>

  <text x="160" y="158" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Old trust signal</text>
  <text x="160" y="198" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" fill="#475569">Stars used to feel like ambient community judgment</text>

  <text x="160" y="286" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" fill="#111827">Now the signal is for sale</text>

  <rect x="160" y="335" width="510" height="295" rx="28" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="200" y="395" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#9a3412">Live purchase page</text>
  <text x="200" y="468" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" fill="#111827">$0.201 / star</text>
  <text x="200" y="525" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" fill="#334155">Order up to 1,000 stars</text>
  <text x="200" y="573" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" fill="#334155">Card and crypto payments</text>

  <rect x="725" y="335" width="510" height="295" rx="28" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="765" y="395" font-family="IBM Plex Sans, Arial, sans-serif" font-size="25" font-weight="700" fill="#9f1239">Measured abuse</text>
  <text x="765" y="468" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700" fill="#111827">6M</text>
  <text x="880" y="468" font-family="IBM Plex Sans, Arial, sans-serif" font-size="33" font-weight="700" fill="#111827">suspected</text>
  <text x="765" y="525" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" fill="#334155">fake GitHub stars</text>
  <text x="765" y="573" font-family="IBM Plex Sans, Arial, sans-serif" font-size="30" fill="#334155">across 18,000+ repos</text>

  <rect x="160" y="675" width="1075" height="84" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="200" y="727" font-family="IBM Plex Sans, Arial, sans-serif" font-size="29" font-weight="700" fill="#1d4ed8">Visibility -> funding attention -> paid stars -> less trust in stars</text>

  <text x="160" y="790" font-family="IBM Plex Sans, Arial, sans-serif" font-size="21" fill="#64748b">Sources: socialplug.io/services/buy-github-stars; He et al., ICSE 2026</text>
</svg>
